<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AILida - 智能导航</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-overlay"></div>
    
    <div class="container">
        <!-- 时间日期显示 -->
        <div class="time-section">
            <div class="time" id="time">00:00</div>
            <div class="date" id="date">加载中...</div>
            <div class="greeting" id="greeting">你好</div>
        </div>

        <!-- 搜索框 -->
        <div class="search-section">
            <div class="search-box">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input type="text" id="searchInput" placeholder="搜索或输入网址" autocomplete="off">
                <div class="search-engines">
                    <button class="engine-btn active" data-engine="google" title="Google">
                        <span>Google</span>
                    </button>
                    <button class="engine-btn" data-engine="baidu" title="百度">
                        <span>百度</span>
                    </button>
                    <button class="engine-btn" data-engine="bing" title="必应">
                        <span>必应</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- 快捷导航 -->
        <div class="shortcuts-section">
            <div class="shortcuts-grid" id="shortcutsGrid">
                <!-- 快捷方式将通过JS动态生成 -->
            </div>
        </div>

        <!-- 添加快捷方式按钮 -->
        <button class="add-shortcut-btn" id="addShortcutBtn" title="添加快捷方式">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        </button>
    </div>

    <!-- 添加/编辑快捷方式模态框 -->
    <div class="modal" id="shortcutModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">添加快捷方式</h3>
                <button class="modal-close" id="modalClose">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label>名称</label>
                    <input type="text" id="shortcutName" placeholder="例如：GitHub">
                </div>
                <div class="input-group">
                    <label>网址</label>
                    <input type="url" id="shortcutUrl" placeholder="例如：https://github.com">
                </div>
                <div class="input-group">
                    <label>图标颜色</label>
                    <div class="color-picker">
                        <button class="color-btn active" data-color="#FF6B6B" style="background: #FF6B6B"></button>
                        <button class="color-btn" data-color="#4ECDC4" style="background: #4ECDC4"></button>
                        <button class="color-btn" data-color="#45B7D1" style="background: #45B7D1"></button>
                        <button class="color-btn" data-color="#96CEB4" style="background: #96CEB4"></button>
                        <button class="color-btn" data-color="#FFEAA7" style="background: #FFEAA7"></button>
                        <button class="color-btn" data-color="#DDA0DD" style="background: #DDA0DD"></button>
                        <button class="color-btn" data-color="#98D8C8" style="background: #98D8C8"></button>
                        <button class="color-btn" data-color="#F7DC6F" style="background: #F7DC6F"></button>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelBtn">取消</button>
                <button class="btn btn-primary" id="saveBtn">保存</button>
            </div>
        </div>
    </div>

    <!-- 右键菜单 -->
    <div class="context-menu" id="contextMenu">
        <button class="context-menu-item" id="editShortcut">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
            <span>编辑</span>
        </button>
        <button class="context-menu-item" id="deleteShortcut">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
            <span>删除</span>
        </button>
    </div>

    <!-- 密码验证模态框 -->
    <div class="modal" id="passwordModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>验证密码</h3>
                <button class="modal-close" id="passwordModalClose">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label>请输入密码以删除快捷方式</label>
                    <input type="password" id="passwordInput" placeholder="请输入密码">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="passwordCancelBtn">取消</button>
                <button class="btn btn-primary" id="passwordConfirmBtn">确认</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
